    - data:
        code: "import json\nimport re\n\nimport requests\n\n\nZULIP_STREAMS_URL =\
          \ \"https://zulip.cit.tum.de/api/v1/streams\"\nZULIP_SUBSCRIPTIONS_URL =\
          \ \"https://zulip.cit.tum.de/api/v1/users/me/subscriptions\"\nREQUEST_TIMEOUT_SECONDS\
          \ = 15\n\n\ndef normalize(name: str) -> str:\n    if name is None:\n   \
          \     return \"\"\n\n    return re.sub(r\"[^a-z0-9]+\", \"\", str(name).lower())\n\
          \n\ndef _clean_stream_name(raw_name) -> str:\n    if raw_name is None:\n\
          \        return \"\"\n\n    return str(raw_name).strip().lstrip(\"#\").strip()\n\
          \n\ndef _extract_original_name(channel):\n    if isinstance(channel, str):\n\
          \        return channel\n\n    if isinstance(channel, dict):\n        return\
          \ channel.get(\"name\")\n\n    return None\n\n\ndef _extract_stream_names(stream_map)\
          \ -> list:\n    if isinstance(stream_map, dict):\n        names = []\n \
          \       for value in stream_map.values():\n            if isinstance(value,\
          \ list):\n                for item in value:\n                    if isinstance(item,\
          \ str):\n                        names.append(item)\n        return names\n\
          \n    if isinstance(stream_map, list):\n        return [item for item in\
          \ stream_map if isinstance(item, str)]\n\n    return []\n\n\ndef _result_item(original_name:\
          \ str, matched_real_name: str, status: str, message: str = \"\") -> dict:\n\
          \    item = {\n        \"original_name\": original_name,\n        \"matched_real_name\"\
          : matched_real_name,\n        \"status\": status,\n    }\n\n    if message:\n\
          \        item[\"message\"] = message\n\n    return item\n\n\ndef _invalid_credentials_result(summary:\
          \ dict) -> dict:\n    summary[\"status\"] = \"error\"\n    summary[\"errors\"\
          ].append(\"Invalid Credentials\")\n    return _finalize_summary(summary)\n\
          \n\ndef _finalize_summary(summary: dict) -> dict:\n    summary[\"subscribed\"\
          ] = sorted(set(summary.get(\"subscribed\", [])))\n    summary[\"failed\"\
          ] = sorted(set(summary.get(\"failed\", [])))\n    summary[\"raw_api_responses\"\
          ] = [\n        response\n        for response in summary.get(\"raw_api_responses\"\
          , [])\n        if response.get(\"request_type\") == \"subscribe\"\n    ]\n\
          \    return {\"result\": json.dumps(summary)}\n\n\ndef main(zulip_api_key:\
          \ str, zulip_email: str, zulip_channels: list) -> dict:\n    summary = {\n\
          \        \"status\": \"complete\",\n        \"subscribed\": [],\n      \
          \  \"failed\": [],\n        \"errors\": [],\n        \"results\": [],\n\
          \        \"stream_count\": 0,\n        \"api_attempts\": [],\n        \"\
          raw_api_responses\": [],\n    }\n\n    if not zulip_api_key or not zulip_email:\n\
          \        return _invalid_credentials_result(summary)\n\n    if not isinstance(zulip_channels,\
          \ list):\n        summary[\"status\"] = \"error\"\n        summary[\"errors\"\
          ].append(\"zulip_channels must be a list\")\n        return _finalize_summary(summary)\n\
          \n    session = requests.Session()\n    session.auth = (zulip_email, zulip_api_key)\n\
          \n    print(\"Fetching available Zulip streams before matching requested\
          \ channels\")\n\n    try:\n        streams_response = session.get(\n   \
          \         ZULIP_STREAMS_URL,\n            timeout=REQUEST_TIMEOUT_SECONDS,\n\
          \        )\n    except requests.exceptions.RequestException as exc:\n  \
          \      summary[\"status\"] = \"error\"\n        summary[\"errors\"].append(\"\
          Network error during stream fetch: {0}\".format(str(exc)))\n        summary[\"\
          api_attempts\"].append(\n            {\n                \"request_type\"\
          : \"fetch_streams\",\n                \"network_error\": str(exc),\n   \
          \         }\n        )\n        return _finalize_summary(summary)\n\n  \
          \  print(\"Fetch streams response status: {0}\".format(streams_response.status_code))\n\
          \    summary[\"api_attempts\"].append(\n        {\n            \"request_type\"\
          : \"fetch_streams\",\n            \"status_code\": streams_response.status_code,\n\
          \        }\n    )\n\n    if streams_response.status_code == 401:\n     \
          \   return _invalid_credentials_result(summary)\n\n    try:\n        streams_data\
          \ = streams_response.json()\n    except ValueError:\n        streams_data\
          \ = {\"result\": \"error\", \"msg\": streams_response.text}\n\n    if streams_data.get(\"\
          result\") != \"success\":\n        summary[\"status\"] = \"error\"\n   \
          \     summary[\"errors\"].append(\n            \"Failed to fetch available\
          \ streams: {0}\".format(\n                streams_data.get(\"msg\") or \"\
          Unknown API error\"\n            )\n        )\n        return _finalize_summary(summary)\n\
          \n    available_stream_names = []\n    normalized_stream_map = {}\n\n  \
          \  for stream in streams_data.get(\"streams\", []):\n        if not isinstance(stream,\
          \ dict):\n            continue\n\n        real_name = stream.get(\"name\"\
          )\n        if not isinstance(real_name, str) or not real_name:\n       \
          \     continue\n\n        available_stream_names.append(real_name)\n   \
          \     normalized_name = normalize(real_name)\n        if not normalized_name:\n\
          \            continue\n\n        if normalized_name not in normalized_stream_map:\n\
          \            normalized_stream_map[normalized_name] = []\n        normalized_stream_map[normalized_name].append(real_name)\n\
          \n    summary[\"stream_count\"] = len(available_stream_names)\n    summary[\"\
          api_attempts\"][-1][\"stream_count\"] = summary[\"stream_count\"]\n    print(\"\
          Available stream count fetched: {0}\".format(summary[\"stream_count\"]))\n\
          \n    matched_real_names = []\n    matched_real_name_set = set()\n    pending_matches\
          \ = []\n\n    for channel in zulip_channels:\n        original_name_value\
          \ = _extract_original_name(channel)\n        original_name = \"\" if original_name_value\
          \ is None else str(original_name_value)\n        original_name_display =\
          \ original_name or str(channel)\n        cleaned_name = _clean_stream_name(original_name_value)\n\
          \n        if not cleaned_name:\n            message = 'Skipping channel\
          \ entry without a valid name: \"{0}\"'.format(\n                str(channel)\n\
          \            )\n            summary[\"errors\"].append(message)\n      \
          \      summary[\"failed\"].append(str(channel))\n            summary[\"\
          results\"].append(\n                _result_item(original_name_display,\
          \ \"\", \"invalid_input\", message)\n            )\n            continue\n\
          \n        normalized_requested_name = normalize(cleaned_name)\n        matching_real_names\
