        code: "import json\nfrom urllib.parse import quote\n\n\nTUMONLINE_SEARCH_URL\
          \ = (\n    \"https://campus.tum.de/tumonline/ee/ui/ca2/app/desktop/\"\n\
          \    \"#/slc.tm.cp/student/courses?$ctx=&$skip=0&objTermId=206&orgId=1&q={0}\"\
          \n)\n\n\ndef _extract_course_name(course) -> str:\n    if isinstance(course,\
          \ str):\n        return course\n\n    if isinstance(course, dict):\n   \
          \     name = course.get(\"name\", \"\")\n        if name is None:\n    \
          \        return \"\"\n        return str(name)\n\n    return \"\"\n\n\n\
          def _extract_priority(course) -> str:\n    if isinstance(course, str):\n\
          \        return \"\"\n\n    if isinstance(course, dict):\n        priority\
          \ = course.get(\"priority\", \"\")\n        if priority is None:\n     \
          \       return \"\"\n        return str(priority)\n\n    return \"\"\n\n\
          \ndef _encode_course_query(course_name: str) -> str:\n    # Start with a\
          \ fully encoded query, then decode only multibyte UTF-8\n    # sequences\
          \ so letters like \"ü\" remain readable while reserved\n    # characters\
          \ such as spaces stay safely encoded as \"%20\".\n    encoded_name = quote(course_name,\
          \ safe=\"\")\n    parts = []\n    index = 0\n\n    while index < len(encoded_name):\n\
          \        if encoded_name[index] != \"%\":\n            parts.append(encoded_name[index])\n\
          \            index += 1\n            continue\n\n        if index + 2 >=\
          \ len(encoded_name):\n            parts.append(encoded_name[index:])\n \
          \           break\n\n        first_byte = int(encoded_name[index + 1 : index\
          \ + 3], 16)\n\n        if first_byte < 0xC2 or first_byte > 0xF4:\n    \
          \        parts.append(encoded_name[index : index + 3])\n            index\
          \ += 3\n            continue\n\n        if first_byte < 0xE0:\n        \
          \    expected_length = 2\n        elif first_byte < 0xF0:\n            expected_length\
          \ = 3\n        else:\n            expected_length = 4\n\n        byte_values\
          \ = [first_byte]\n        cursor = index + 3\n        is_complete = True\n\
          \n        for _ in range(expected_length - 1):\n            if cursor +\
          \ 2 >= len(encoded_name) or encoded_name[cursor] != \"%\":\n           \
          \     is_complete = False\n                break\n\n            next_byte\
          \ = int(encoded_name[cursor + 1 : cursor + 3], 16)\n            if next_byte\
          \ < 0x80 or next_byte > 0xBF:\n                is_complete = False\n   \
          \             break\n\n            byte_values.append(next_byte)\n     \
          \       cursor += 3\n\n        if not is_complete:\n            parts.append(encoded_name[index\
          \ : index + 3])\n            index += 3\n            continue\n\n      \
          \  try:\n            parts.append(bytes(byte_values).decode(\"utf-8\"))\n\
          \        except UnicodeDecodeError:\n            parts.append(encoded_name[index\
          \ : index + 3])\n            index += 3\n            continue\n\n      \
          \  index = cursor\n\n    return \"\".join(parts)\n\n\ndef main(tumonline_courses:\
          \ list) -> dict:\n    payload = {\"links\": []}\n\n    if not isinstance(tumonline_courses,\
          \ list):\n        return {\"result\": json.dumps(payload, ensure_ascii=False)}\n\
          \n    for course in tumonline_courses:\n        course_name = _extract_course_name(course)\n\
          \n        if not course_name:\n            continue\n\n        priority\
