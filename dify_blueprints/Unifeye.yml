                    description: Name of the Zulip channel, Artemis course, TUMonline
                      course, or TUMonline exam.
                    type: string
                  priority:
                    description: Use do_now only when the item has an extracted date
                      and is immediately actionable.
                    enum:
                    - do_now
                    - schedule
                    type: string
                  task_description:
                    description: What the user needs to check, submit, prepare, or
                      follow up on.
                    type: string
                required:
                - name
                - date
                - priority
                - task_description
                type: object
            $schema: https://json-schema.org/draft/2020-12/schema
            additionalProperties: false
            properties:
              artemis_courses:
                items:
                  $ref: '#/$defs/logistical_item'
                type: array
              thought_process:
                description: Short extraction summary describing deduplication and
                  the main logistical items identified.
                type: string
              tumonline_courses:
                items:
                  $ref: '#/$defs/logistical_item'
                type: array
