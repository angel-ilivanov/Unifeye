          \           expected_length = 2\n        elif first_byte < 0xF0:\n     \
          \       expected_length = 3\n        else:\n            expected_length\
          \ = 4\n\n        byte_values = [first_byte]\n        cursor = index + 3\n\
          \        is_complete = True\n\n        for _ in range(expected_length -\
